<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丛林保卫战 - 单人对战核心</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 选卡界面 -->
    <div id="selection-screen">
        <div class="selection-container">
            <h1>选择卡牌 (6/6)</h1>
            <div class="selected-count">
                已选择: <span id="selected-count">0</span> / 6
            </div>

            <div class="card-grid" id="card-grid">
                <!-- JS 动态渲染所有卡牌 -->
            </div>

            <button id="start-battle-btn" disabled>开始战斗</button>
        </div>
    </div>

    <!-- 游戏主界面 -->
    <div id="game-container" style="display: none;">
        <!-- 顶部资源 + 横向手牌栏 -->
        <div class="top-bar">
            <div class="resources">
                <div class="resource sunlight">
                    <span class="icon">🌞</span>
                    <span id="sunlight">5</span>
                    <span class="max">/20</span>
                </div>
                <div class="resource food">
                    <span class="icon">🍖</span>
                    <span id="food">5</span>
                    <span class="max">/20</span>
                </div>
            </div>

            <div class="hand-bar">
                <div class="hand-cards" id="hand-cards"></div>
            </div>

            <div class="base-hp">
                <div class="hp-item player">
                    <span>我方</span>
                    <span id="player-base-hp">1000</span>
                </div>
                <div class="hp-item enemy">
                    <span>敌方</span>
                    <span id="enemy-base-hp">1000</span>
                </div>
            </div>
        </div>

        <div class="main-container">
            <div class="side left-side">
                <div class="side-decoration">
                    <div class="side-label">我方基地</div>
                </div>
            </div>

            <div class="battlefield-container">
                <div class="battlefield" id="battlefield"></div>
            </div>

            <div class="side right-side">
                <div class="log-container">
                    <div class="log-header">战斗日志</div>
                    <div class="log" id="log">
                        <div id="log-content"></div>
                    </div>
                </div>

                <div class="controls">
                    <button id="start-wave-btn">触发波次</button>
                    <button id="reset-btn" class="danger">重置</button>
                </div>
            </div>
        </div>
    </div>

    <script src="cards.js"></script>
    <script src="script.js"></script>
</body>
</html>

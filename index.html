<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丛林保卫战 - 单人对战核心</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="top-bar">
            <div class="level-info">
                <span>第 <span id="level-number">1</span> 关</span>
                <span id="level-name">初始防御</span>
            </div>
            <div class="resources">
                <div class="resource sunlight">
                    <span class="icon">🌞</span>
                    <span id="sunlight">5</span> / 20
                </div>
                <div class="resource food">
                    <span class="icon">🍖</span>
                    <span id="food">5</span> / 20
                </div>
            </div>
            <div class="base-hp">
                <div>我方基地: <span id="player-base-hp">1000</span></div>
                <div>敌方基地: <span id="enemy-base-hp">1000</span></div>
            </div>
        </div>

        <div class="hand-area">
            <h3>卡牌手牌</h3>
            <div class="hand-cards" id="hand-cards"></div>
        </div>

        <div class="battlefield-wrapper">
            <div class="battlefield-labels">
                <div class="battlefield-label left">我方区域</div>
                <div class="battlefield-label right">敌方区域</div>
            </div>
            <div class="battlefield" id="battlefield"></div>
        </div>

        <div class="controls">
            <button id="start-wave-btn">触发波次</button>
            <button id="reset-btn" class="danger">重置游戏</button>
        </div>

        <div class="log" id="log">
            <h4>战斗日志</h4>
            <div id="log-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

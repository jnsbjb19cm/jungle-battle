<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丛林保卫战 - 单人对战核心</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部资源 + 横向手牌栏 -->
    <div class="top-bar">
        <div class="resources">
            <div class="resource sunlight">
                <span class="icon">🌞</span>
                <span id="sunlight">5</span>
                <span class="max">/20</span>
            </div>
            <div class="resource food">
                <span class="icon">🍖</span>
                <span id="food">5</span>
                <span class="max">/20</span>
            </div>
        </div>

        <div class="hand-bar">
            <div class="hand-cards" id="hand-cards"></div>
        </div>

        <div class="base-hp">
            <div class="hp-item player">
                <span>我方</span>
                <span id="player-base-hp">1000</span>
            </div>
            <div class="hp-item enemy">
                <span>敌方</span>
                <span id="enemy-base-hp">1000</span>
            </div>
        </div>
    </div>

    <!-- 主要内容区域 -->
    <div class="main-container">
        <!-- 左侧装饰（可后续加角色） -->
        <div class="side left-side">
            <div class="side-decoration">
                <div class="side-label">我方基地</div>
            </div>
        </div>

        <!-- 中间战场 -->
        <div class="battlefield-container">
            <div class="battlefield" id="battlefield"></div>
        </div>

        <!-- 右侧日志 -->
        <div class="side right-side">
            <div class="log-container">
                <div class="log-header">战斗日志</div>
                <div class="log" id="log">
                    <div id="log-content"></div>
                </div>
            </div>

            <div class="controls">
                <button id="start-wave-btn">触发波次</button>
                <button id="reset-btn" class="danger">重置</button>
            </div>
        </div>
    </div>

    <script src="cards.js"></script>
    <script src="script.js"></script>
</body>
</html>

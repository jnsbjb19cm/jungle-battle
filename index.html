<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>丛林保卫战</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <div class="top-bar">
            <div class="resources">
                <div class="resource sunlight">
                    <span>🌞</span>
                    <span id="sunlight">5</span>
                    <span>/20</span>
                </div>
                <div class="resource food">
                    <span>🍖</span>
                    <span id="food">5</span>
                    <span>/20</span>
                </div>
            </div>

            <div class="hand-bar">
                <div class="hand-cards" id="hand-cards"></div>
            </div>

            <div class="base-hp">
                <div>我方 <span id="player-base-hp">1000</span></div>
                <div>敌方 <span id="enemy-base-hp">1000</span></div>
            </div>
        </div>

        <div class="main-container">
            <div class="side left-side">
                <div class="side-label">我方基地</div>
            </div>

            <div class="battlefield-container">
                <div class="battlefield" id="battlefield"></div>
            </div>

            <div class="side right-side">
                <div class="log-container">
                    <div class="log-header">战斗日志</div>
                    <div class="log" id="log-content"></div>
                </div>

                <div class="controls">
                    <button onclick="startWave()">触发波次</button>
                    <button onclick="resetGame()">重置</button>
                </div>
            </div>
        </div>
    </div>

    <script src="cards.js"></script>
    <script src="script.js"></script>
</body>
</html>
